events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Servir el frontend compilado
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 🔀 Redirigir peticiones de Ventas al servicio interno de Kubernetes
        location /api/v1/ventas {
            proxy_pass http://backend-ventas-service.default.svc.cluster.local:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

       # 🔀 Redirigir peticiones de Despachos usando IP interna directa de K8s
        location /api/v1/despachos {
            # Forzamos la conexión a la IP de red del clúster en el puerto común de Spring Boot (8080)
            proxy_pass http://172.20.68.52:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Prueba primero CON esta línea activa. Si no funciona, editas el archivo, 
            # le pones un # al principio a la línea de abajo (para comentarla) y guardas.
            rewrite ^/api/v1/(.*)$ /$1 break;
        }
    }
}
