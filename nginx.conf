events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Servir el frontend compilado
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 🔀 Redirigir peticiones de Ventas al servicio interno de Kubernetes
        location /api/v1/ventas {
            proxy_pass http://backend-ventas-service.default.svc.cluster.local:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

       # 🔀 Redirigir peticiones de Despachos al servicio interno de Kubernetes
        location /api/v1/despachos {
            # Si el puerto 8081 sigue dando 502, cambia esta línea al puerto 8080 para probar
            proxy_pass http://backend-despachos-service.default.svc.cluster.local:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Esto ayuda a resolver problemas si el backend espera la ruta sin el "/api/v1"
            # rewrite ^/api/v1/(.*)$ /$1 break; 
        }
    }
}
