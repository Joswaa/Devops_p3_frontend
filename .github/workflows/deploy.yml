name: Frontend Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          # Construye la imagen usando el registro de AWS y tu secreto para el repositorio 'frontend'
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_FRONTEND }}:latest .

      - name: Push Docker image
          # Sube la imagen directamente a tu Amazon ECR público/privado
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_FRONTEND }}:latest

      - name: Update kubeconfig
        run: |
          # Conecta GitHub Actions de forma segura con tu clúster de EKS
          aws eks update-kubeconfig --name eks-proyect-innovatech --region ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          # Aplica el archivo k8s/deployment.yml en el clúster
          kubectl apply -f k8s/deployment.yml
          
          # Fuerza el reinicio del deployment 'frontend' para aplicar la nueva imagen de inmediato
          kubectl rollout restart deployment/frontend
