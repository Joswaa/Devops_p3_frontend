name: Frontend Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPO_FRONTEND }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ECR_REPO_FRONTEND }}:latest

      - name: Update kubeconfig
        run: |
          # Esto conecta GitHub Actions con tu clúster EKS en AWS
          aws eks update-kubeconfig --name cluster-arquitectura-microservicios --region ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          # Esto lee tu archivo de configuración y crea el Frontend en el clúster
          kubectl apply -f k8s/deployment.yml
