apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: frontend-app
        # Usamos la URI de tu ECR apuntando al contenedor del frontend
        image: 921558516087.dkr.ecr.us-east-1.amazonaws.com/frontend-app:latest
        ports:
        - containerPort: 80
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  type: LoadBalancer # AWS EKS nos dará una URL pública aquí
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
