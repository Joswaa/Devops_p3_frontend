apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-nuevo  # 👈 Cambiamos el nombre para forzar un recurso limpio
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-nuevo
  template:
    metadata:
      labels:
        app: frontend-nuevo
    spec:
      containers:
      - name: frontend
        # Confirmamos que apunte a tu repositorio 'frontend' en ECR
        image: 921558516087.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
        ports:
        - containerPort: 80
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: frontend-nuevo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
